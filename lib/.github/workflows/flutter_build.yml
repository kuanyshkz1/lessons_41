name: Flutter CI/CD

# Триггеры: пайплайн будет запускаться при пушах и пулл-реквестах в ветки main и master
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    # Используем Ubuntu, так как для сборки APK macOS не требуется
    runs-on: ubuntu-latest

    steps:
      # 1. Клонирование репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Установка Java (необходима для сборки Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Установка Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Можно поменять на beta или master, если используете их
          cache: true       # Включает кэширование для ускорения последующих сборок

      # 4. Загрузка зависимостей
      - name: Install Dependencies
        run: flutter pub get

      # 5. Статический анализ кода
      - name: Analyze Code
        run: flutter analyze

      # 6. Запуск тестов
      - name: Run Tests
        run: flutter test

      # 7. Сборка Dev APK (Debug)
      - name: Build Dev APK
        run: flutter build apk --debug --flavor dev -t lib/main_dev.dart --build-number=${{ github.run_number }}

      # 8. Сборка Prod APK (Release)
      - name: Build Prod APK
        run: flutter build apk --release --flavor prod -t lib/main_prod.dart --build-number=${{ github.run_number }}

      # 9. Сохранение Dev APK в артефакты
      - name: Upload Dev APK
        uses: actions/upload-artifact@v4
        with:
          name: qaztender-dev-debug
          path: build/app/outputs/flutter-apk/app-dev-debug.apk
          retention-days: 7

      # 10. Сохранение Prod APK в артефакты
      - name: Upload Prod APK
        uses: actions/upload-artifact@v4
        with:
          name: qaztender-prod-release
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 7